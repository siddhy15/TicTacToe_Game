<div class="game-mode">

  <h3>Select Mode</h3>

  <button onclick="setMode('person')">
    👥 Play With Person
  </button>

  <button onclick="setMode('robot')">
    🤖 Play With Robot
  </button>

</div><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe Robot Mode</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:linear-gradient(
        135deg,
        #87CEEB,
        #6A5ACD,
        #8A2BE2
      );

      overflow:hidden;
    }

    .game-container{

      text-align:center;

      background:rgba(255,255,255,0.15);

      backdrop-filter:blur(10px);

      border:1px solid rgba(255,255,255,0.2);

      padding:30px;

      border-radius:25px;

      box-shadow:0 10px 30px rgba(0,0,0,0.3);

    }

    h1{
      color:white;
      margin-bottom:20px;
      font-size:40px;
    }

    #status{
      color:white;
      font-size:22px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .choose-player{
      margin-bottom:20px;
    }

    .choose-player h3{
      color:white;
      margin-bottom:10px;
    }

    .choose-player button{
      margin:5px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,110px);
      gap:12px;
      justify-content:center;
    }

    .cell{

      width:110px;
      height:110px;

      background:rgba(255,255,255,0.2);

      border-radius:20px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:45px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

    }

    .cell:hover{

      transform:scale(1.08);

      background:rgba(255,255,255,0.35);

    }

    .x{
      color:#ff4b91;
    }

    .o{
      color:#00e5ff;
    }

    button{

      padding:12px 22px;

      border:none;

      border-radius:12px;

      background:white;

      color:#6A5ACD;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

    }

    button:hover{
      transform:scale(1.05);
    }

    .restart-btn{
      margin-top:20px;
    }

    /* Popup */

    .popup{

      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background:rgba(0,0,0,0.5);

      display:none;

      justify-content:center;
      align-items:center;

    }

    .popup-content{

      background:white;

      padding:30px;

      border-radius:20px;

      text-align:center;

      animation:popupAnim 0.4s ease;

    }

    .popup-content h2{
      margin-bottom:20px;
      color:#6A5ACD;
    }

    @keyframes popupAnim{

      from{
        transform:scale(0.5);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }

    }

  </style>

</head>

<body>

  <div class="game-container">

    <h1>🎮 Tic Tac Toe</h1>

    <div class="choose-player">

      <h3>Choose Your Side</h3>

      <button onclick="choosePlayer('X')">
        Play As X
      </button>

      <button onclick="choosePlayer('O')">
        Play As O
      </button>

    </div>

    <div id="status">
      Choose Your Side
    </div>

    <div class="board">

      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>

      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>

      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>

    </div>

    <button
      class="restart-btn"
      onclick="restartGame()"
    >
      Restart Game
    </button>

  </div>

  <!-- Popup -->

  <div class="popup" id="popup">

    <div class="popup-content">

      <h2 id="winnerText">
        Winner
      </h2>

      <button onclick="restartGame()">
        Restart
      </button>

    </div>

  </div>

  <script>

    const cells =
      document.querySelectorAll(".cell");

    const statusText =
      document.getElementById("status");

    const popup =
      document.getElementById("popup");

    const winnerText =
      document.getElementById("winnerText");

    let humanPlayer = "X";

    let robotPlayer = "O";

    let currentPlayer = "X";

    let gameActive = true;

    let gameState = [
      "", "", "",
      "", "", "",
      "", "", ""
    ];

    const winningConditions = [

      [0,1,2],
      [3,4,5],
      [6,7,8],

      [0,3,6],
      [1,4,7],
      [2,5,8],

      [0,4,8],
      [2,4,6]

    ];

    /* Choose Player */

    function choosePlayer(player){

      humanPlayer = player;

      robotPlayer =
        player === "X" ? "O" : "X";

      restartGame();

      if(robotPlayer === "X"){

        currentPlayer = "X";

        statusText.textContent =
          "🤖 Robot Thinking...";

        setTimeout(robotMove, 700);

      }

    }

    /* Handle Click */

    function handleCellClick(e){

      const clickedCell = e.target;

      const index =
        clickedCell.getAttribute("data-index");

      if(
        gameState[index] !== "" ||
        !gameActive ||
        currentPlayer !== humanPlayer
      ){
        return;
      }

      makeMove(index, humanPlayer);

      if(gameActive){

        currentPlayer = robotPlayer;

        statusText.textContent =
          "🤖 Robot Thinking...";

        setTimeout(robotMove, 600);

      }

    }

    /* Make Move */

    function makeMove(index, player){

      gameState[index] = player;

      cells[index].textContent = player;

      cells[index].classList.add(
        player.toLowerCase()
      );

      checkWinner();

    }

    /* Robot Move */

    function robotMove(){

      let emptyCells = [];

      gameState.forEach((cell, index) => {

        if(cell === ""){
          emptyCells.push(index);
        }

      });

      if(emptyCells.length === 0){
        return;
      }

      const randomIndex =

        emptyCells[
          Math.floor(
            Math.random() * emptyCells.length
          )
        ];

      makeMove(randomIndex, robotPlayer);

      if(gameActive){

        currentPlayer = humanPlayer;

        statusText.textContent =
          `Player ${humanPlayer} Turn`;

      }

    }

    /* Check Winner */

    function checkWinner(){

      let roundWon = false;

      for(let i = 0;
          i < winningConditions.length;
          i++){

        const [a,b,c] =
          winningConditions[i];

        if(
          gameState[a] &&
          gameState[a] === gameState[b] &&
          gameState[a] === gameState[c]
        ){

          roundWon = true;
          break;

        }

      }

      if(roundWon){

        gameActive = false;

        if(currentPlayer === robotPlayer){

          winnerText.textContent =
            "🤖 Robot Wins!";

        } else {

          winnerText.textContent =
            `🏆 Player ${humanPlayer} Wins!`;

        }

        popup.style.display = "flex";

        return;

      }

      if(!gameState.includes("")){

        gameActive = false;

        winnerText.textContent =
          "🤝 It's A Draw!";

        popup.style.display = "flex";

      }

    }

    /* Restart */

    function restartGame(){

      gameActive = true;

      gameState = [

        "", "", "",
        "", "", "",
        "", "", ""

      ];

      popup.style.display = "none";

      cells.forEach(cell => {

        cell.textContent = "";

        cell.classList.remove(
          "x",
          "o"
        );

      });

      currentPlayer = "X";

      statusText.textContent =
        `Player ${currentPlayer} Turn`;

    }

    /* Event Listeners */

    cells.forEach(cell => {

      cell.addEventListener(
        "click",
        handleCellClick
      );

    });

  </script>

</body>
</html>
